<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menú Restaurante</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/main.js"></script>
    </head>
    <body>
        <div>
            <img src="images/logo_sombra.png" class="logo">
        </div>

        <!-- Barra de navegación -->
        <nav class="navbar">
            <button id="default-btn" onclick="showCategory('breakfast', this)">Desayuno</button>
            <button onclick="showCategory('food', this)">Comida</button>
            <button onclick="showCategory('drinks', this)">Bebidas</button>
        </nav>

        <!-- Contenedor de las imágenes -->
        <div id="gallery" class="container">
            <!-- Menú de desayuno -->
            <div class="card-wrapper breakfast">
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="front"><img src="images/desayuno_1.webp"></div>
                    <div class="back"><img src="images/desayuno_2.webp"></div>
                </div>
            </div>

            <!-- Menú de comida -->
            <div class="card-wrapper food">
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="front"><img src="images/comida_1.webp"></div>
                    <div class="back"><img src="images/comida_2.webp"></div>
                </div>
            </div>

            <!-- Menú de bebidas -->
            <div class="card-wrapper drinks">
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="front"><img src="images/bebidas_1.webp"></div>
                    <div class="back"><img src="images/bebidas_2.webp"></div>
                </div>
            </div>
        </div>
    </body>
</html>
